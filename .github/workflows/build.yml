name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends scdoc
      - name: Install dependencies
        if: matrix.os == 'macos-latest'
        run: brew install scdoc
      - uses: extractions/setup-just@v4
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --verbose
      - name: Build man pages
        if: matrix.os != 'windows-latest'
        run: just doc
      - name: Create the release tarball
        if: matrix.os != 'windows-latest'
        run: |
          version=$(cargo pkgid | cut -d @ -f 2)
          cp target/release/{dotbackup,dotsetup} docs/*.{1,5} .
          tar cavf "dotbackup-$version-${{ matrix.platform }}.tar.xz" LICENSE README.md dotbackup dotsetup ./*.1 ./*.5
      - name: Create the release zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = (cargo pkgid).Split('@')[-1]
          Copy-Item -Force -Path target/release/dotbackup.exe, target/release/dotsetup.exe -Destination .
          Compress-Archive -Path LICENSE, README.md, dotbackup.exe, dotsetup.exe -Destination "dotbackup-$version-${{ matrix.platform }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          path: dotbackup-*
          archive: false
      - name: Run tests
        run: cargo test --verbose
      - name: Lint code
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy
      - name: Check code style
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - name: Spell check
        if: matrix.os == 'ubuntu-latest'
        uses: crate-ci/typos@v1

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    environment: release  # Optional: for enhanced security
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          skip-decompress: true
      - name: Publish to GitHub
        uses: softprops/action-gh-release@v3
        with:
          files: dotbackup-*

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: github.ref_type == 'tag'
    environment: release  # Optional: for enhanced security
    permissions:
      id-token: write     # Required for OIDC token exchange
    steps:
    - uses: actions/checkout@v6
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth
    - run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
